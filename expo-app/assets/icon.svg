<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFAF8"/>
      <stop offset="100%" stop-color="#F5EEE8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- Notebook style border -->
  <rect x="80" y="80" width="864" height="864" rx="160" fill="none" stroke="#B1744B" stroke-width="20" opacity="0.15"/>

  <!-- Book/notebook cover -->
  <rect x="320" y="180" width="420" height="664" rx="28" fill="#B1744B" opacity="0.12"/>
  <rect x="310" y="170" width="420" height="664" rx="28" fill="none" stroke="#B1744B" stroke-width="8" opacity="0.25"/>

  <!-- Notebook spine -->
  <line x1="310" y1="170" x2="310" y2="834" stroke="#B1744B" stroke-width="6" stroke-linecap="round" opacity="0.3"/>

  <!-- Writing lines -->
  <line x1="380" y1="350" x2="680" y2="350" stroke="#B1744B" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  <line x1="380" y1="420" x2="660" y2="420" stroke="#B1744B" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  <line x1="380" y1="490" x2="640" y2="490" stroke="#B1744B" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  <line x1="380" y1="560" x2="670" y2="560" stroke="#B1744B" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  <line x1="380" y1="630" x2="620" y2="630" stroke="#B1744B" stroke-width="8" stroke-linecap="round" opacity="0.35"/>

  <!-- Pen on the right -->
  <g transform="rotate(-30, 720, 600)">
    <rect x="710" y="400" width="10" height="280" rx="5" fill="#B1744B" opacity="0.7"/>
    <polygon points="715,680 710,700 720,700" fill="#B1744B" opacity="0.8"/>
    <circle cx="715" cy="390" r="12" fill="#B1744B" opacity="0.6"/>
  </g>

  <!-- Star accent - reflection/insight -->
  <circle cx="180" cy="180" r="60" fill="#B1744B" opacity="0.08"/>
  <path d="M180 150 L188 175 L215 175 L193 192 L200 218 L180 200 L160 218 L167 192 L145 175 L172 175 Z" fill="#B1744B" opacity="0.3"/>

  <!-- Small sparkle dots -->
  <circle cx="840" cy="200" r="10" fill="#B1744B" opacity="0.2"/>
  <circle cx="200" cy="820" r="8" fill="#B1744B" opacity="0.15"/>
  <circle cx="790" cy="790" r="6" fill="#B1744B" opacity="0.15"/>
</svg>
